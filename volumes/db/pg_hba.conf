# PostgreSQL Client Authentication — Trust mode
#
# The DB is only reachable from within dokploy-network (no ports: mapping).
# Trust auth lets db-setup reset all passwords on startup without needing
# to know the old superuser password (fixes stale volumes).
#
# After db-setup runs, all role passwords are set to POSTGRES_PASSWORD,
# so switching back to scram-sha-256 here would work — but trust is fine
# given the network isolation.
local   all   all             trust
host    all   all   0.0.0.0/0 trust
host    all   all   ::/0      trust
