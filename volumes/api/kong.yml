_format_version: "1.1"

###############################################################################
# Consumers
###############################################################################
consumers:
  - username: ANON
    keyauth_credentials:
      - key: ${ANON_KEY}
    acls:
      - group: anon
  - username: SERVICE_ROLE
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}
    acls:
      - group: admin
  - username: DASHBOARD
    basicauth_credentials:
      - username: ${DASHBOARD_USERNAME}
        password: ${DASHBOARD_PASSWORD}
    acls:
      - group: admin

###############################################################################
# Plugins (global)
###############################################################################
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - apikey
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

###############################################################################
# Services & Routes
###############################################################################
services:
  ## ── Auth ────────────────────────────────────────────────────────────────
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: key-auth
        config:
          hide_credentials: false

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: key-auth
        config:
          hide_credentials: false

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: key-auth
        config:
          hide_credentials: false

  - name: auth-v1
    _comment: "GoTrue: /auth/v1/* -> http://auth:9999/*"
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## ── REST ────────────────────────────────────────────────────────────────
  - name: rest-v1
    _comment: "PostgREST: /rest/v1/* -> http://rest:3000/*"
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## ── GraphQL ─────────────────────────────────────────────────────────────
  - name: graphql-v1
    _comment: "PostgREST GraphQL: /graphql/v1/* -> http://rest:3000/rpc/graphql"
    url: http://rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
      - name: request-transformer
        config:
          add:
            headers:
              - Content-Profile:graphql_public

  ## ── Realtime ────────────────────────────────────────────────────────────
  - name: realtime-v1
    _comment: "Realtime: /realtime/v1/* -> http://realtime:4000/socket/*"
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## ── Storage ─────────────────────────────────────────────────────────────
  - name: storage-v1
    _comment: "Storage: /storage/v1/* -> http://storage:5000/*"
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## ── postgres-meta ────────────────────────────────────────────────────────
  - name: meta
    _comment: "postgres-meta: /pg-meta/* -> http://meta:8080/*"
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg-meta/
    plugins:
      - name: basic-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  ## ── Studio ──────────────────────────────────────────────────────────────
  - name: studio
    _comment: "Studio: /studio/* -> http://studio:3000/*"
    url: http://studio:3000/
    routes:
      - name: studio-all
        strip_path: true
        paths:
          - /studio/
    plugins:
      - name: basic-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

###############################################################################
# ACL groups
###############################################################################
# anon consumer -> anon group
# service_role consumer -> admin group
# dashboard consumer -> admin group

# Manually assign ACL groups via the consumer plugins below:
# (Kong DB-less doesn't support consumer plugins inline in this format,
#  so group membership is handled by the key-auth consumer names above
#  matching the ACL allow list — adjust if using DB mode)
